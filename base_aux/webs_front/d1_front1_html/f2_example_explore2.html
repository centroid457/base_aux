<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleExplore</title>
    <style>
/* ===== Группа полей (fieldset) ===== */
fieldset {
    border: 1px solid #cbd5e1;
    border-radius: 1rem;
    padding: 1.25rem 1rem 1rem 1rem;
    margin: 1.5rem 0;
    background: #ffffff;
    transition: border-color 0.2s;
}

/* Заголовок группы (legend) */
legend {
    float: left;               /* для корректного позиционирования */
    width: auto;
    padding: 0 0.75rem;
    margin: 0 0 0 -0.5rem;     /* небольшой отступ, чтобы не прилипало */
    font-size: 0.9rem;
    font-weight: 600;
    color: #1e2a3e;
    background: white;
    border-radius: 2rem;
    line-height: 1.3;
}

/* Исправляем баг с float (clearfix) */
fieldset::after {
    content: '';
    display: table;
    clear: both;
}

/* Отключённая группа полей */
fieldset:disabled,
fieldset[disabled] {
    opacity: 0.6;
    background: #f8fafc;
    cursor: not-allowed;
}

fieldset:disabled legend,
fieldset[disabled] legend {
    color: #94a3b8;
}

/* ===== Метки (label) ===== */
label {
    display: inline-block;
    margin-bottom: 0.25rem;
    font-weight: 500;
    color: #1e2a3e;
    cursor: pointer;
}

/* Для обязательных полей */
label.required::after {
    content: '*';
    color: #e53e3e;
    margin-left: 0.25rem;
}

/* ===== Поля ввода (общие) ===== */
input:not([type="checkbox"]):not([type="radio"]),
select,
textarea {
    width: 100%;
    padding: 0.6rem 0.75rem;
    font-size: 0.9rem;
    font-family: inherit;
    border: 1px solid #cbd5e1;
    border-radius: 0.75rem;
    background: white;
    transition: border-color 0.2s, box-shadow 0.2s;
}

/* Состояние фокуса */
input:focus,
select:focus,
textarea:focus {
    outline: none;
    border-color: #2a73ff;
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.2);
}

/* Состояние ошибки */
input:invalid:not(:placeholder-shown),
select:invalid:not(:placeholder-shown),
textarea:invalid:not(:placeholder-shown) {
    border-color: #e53e3e;
}
input:invalid:focus,
select:invalid:focus,
textarea:invalid:focus {
    box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.2);
}

/* Чекбоксы и радио — более крупные, удобные */
input[type="checkbox"],
input[type="radio"] {
    width: 1.1rem;
    height: 1.1rem;
    margin-right: 0.4rem;
    vertical-align: middle;
    cursor: pointer;
}

/* ===== Текстовая подсказка (small, hint) ===== */
.form-hint {
    display: block;
    font-size: 0.75rem;
    color: #5b6e8c;
    margin-top: 0.25rem;
}

/* Сообщение об ошибке */
.form-error {
    color: #e53e3e;
    font-size: 0.75rem;
    margin-top: 0.25rem;
}

/* ===== Горизонтальная форма (если нужно) ===== */
.form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-start;
}
.form-row > .form-group {
    flex: 1;
    min-width: 150px;
}
    </style>
</head>
<body>
<form>
    <fieldset>
        <legend>👤 Личные данные</legend>

        <div class="form-group">
            <label for="name">Имя <span class="required">*</span></label>
            <input type="text" id="name" required placeholder="Иван Иванов">
            <small class="form-hint">Введите полное имя</small>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="ivan@example.com">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="age">Возраст</label>
                <input type="number" id="age" min="0" max="120">
            </div>
            <div class="form-group">
                <label for="city">Город</label>
                <select id="city">
                    <option>Москва</option>
                    <option>СПб</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox"> Согласен с условиями
            </label>
        </div>
    </fieldset>

    <fieldset disabled>
        <legend>🔒 Административная панель (недоступна)</legend>
        <input type="text" value="Заблокировано">
    </fieldset>
</form>
</body>
</html>
