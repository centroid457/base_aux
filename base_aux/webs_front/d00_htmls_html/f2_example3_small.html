                        <hr>
                        <h4>Кастомное сообщение об ошибке (JavaScript)</h4>
                        <form id="customValidityForm" onsubmit="return false;">
                            <label>Пароль (минимум 6 символов):
                                <input type="password" id="passwordField" required>
                            </label>
                            <div id="passwordError" style="color: #ef4444; font-size: 0.85rem;"></div>
                            <button type="submit">Проверить</button>
                        </form>
                        <script>
                            const passwordField = document.getElementById('passwordField');
                            const form = document.getElementById('customValidityForm');

                            passwordField.addEventListener('input', function() {
                                if (this.value.length < 6) {
                                    this.setCustomValidity('Пароль должен содержать минимум 6 символов');
                                    document.getElementById('passwordError').textContent = this.validationMessage;
                                } else {
                                    this.setCustomValidity('');
                                    document.getElementById('passwordError').textContent = '';
                                }
                            });

                            form.addEventListener('submit', function(e) {
                                if (!passwordField.checkValidity()) {
                                    e.preventDefault();
                                    alert(passwordField.validationMessage);
                                } else {
                                    alert('Пароль принят');
                                }
                            });
                        </script>
